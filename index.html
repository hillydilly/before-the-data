  <style>
    /* Archive banner — mobile only, full-width strip */
    #archive-banner {
      display: none; /* JS controls visibility */
      background: #000;
      color: #fff;
      position: relative;
      margin: -24px -16px 16px; /* bleed to edges on mobile */
    }
    #archive-banner a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 40px 12px 16px;
      color: #fff;
      text-decoration: none;
      gap: 8px;
    }
    #archive-banner .archive-banner-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }
    #archive-banner .archive-banner-cta {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #archive-banner-dismiss {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    #archive-banner-dismiss:hover { color: #fff; }
    /* Only show on mobile */
    @media (min-width: 768px) {
      #archive-banner { display: none !important; }
    }
  </style>

    </div>

    </div>

      <h2>New Music</h2>
    </div>
    <div id="new-music-scroll" class="music-scroll"></div>

    <div class="section-header mt-40">

  <!-- Archive banner JS -->
  <script>
    (function () {
      var DISMISS_KEY = 'btd_archive_banner_dismissed';
      var banner = document.getElementById('archive-banner');
      var dismissBtn = document.getElementById('archive-banner-dismiss');
      if (!banner) return;
      try {
        if (!localStorage.getItem(DISMISS_KEY) && window.innerWidth < 768) {
          banner.style.display = 'block';
        }
      } catch (e) {}
      if (dismissBtn) {
        dismissBtn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          banner.style.display = 'none';
          try { localStorage.setItem(DISMISS_KEY, '1'); } catch (e) {}
        });
      }
    })();
  </script>

  <!-- Mobile Heard First sticky CTA -->
  <div id="hf-mobile-cta">
    <a href="/heard-first.html">
      <span>★ Heard First</span>

    </a>
