  <style>
    /* ── Hillydilly post page layout ─────────────────────────────────────────
       Desktop: fixed top bar + fixed left nav + main content + right share strip
       Page bg is light gray; center card is white; share strip is slightly darker gray
    ── */

    body[data-page="post"] {
      background: #f0f0f0;
    }

    /* Top player bar — override for post page: show logo left, controls center, search right */
    body[data-page="post"] #player-bar {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      justify-content: space-between;
      padding: 0 16px 0 0;
    }
    .hd-topbar-left {
      display: flex; align-items: center; gap: 0;
      flex-shrink: 0;
    }
    .hd-logo-mark {
      width: 56px; height: var(--player-h);
      display: flex; align-items: center; justify-content: center;
      background: #c0392b;
      flex-shrink: 0;
    }
    .hd-logo-mark img {
      width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1);
    }
    .hd-topbar-controls {
      display: flex; align-items: center; gap: 4px;
      padding: 0 16px;
    }
    .hd-topbar-controls button {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #444;
      transition: background .15s;
    }
    .hd-topbar-controls button:hover { background: #f0f0f0; }
    .hd-topbar-controls .hd-play-btn {
      width: 38px; height: 38px; background: #222; color: #fff;
      font-size: 16px; border-radius: 50%;
    }
    .hd-topbar-controls .hd-play-btn:hover { background: #000; }

    /* Currently playing track in top bar */
    .hd-topbar-track {
      display: flex; align-items: center; gap: 10px;
      flex: 1; min-width: 0; padding: 0 8px;
      overflow: hidden;
    }
    .hd-topbar-art {
      width: 34px; height: 34px; border-radius: 3px;
      object-fit: cover; flex-shrink: 0; background: #ddd;
    }
    .hd-topbar-info {
      min-width: 0; overflow: hidden;
    }
    .hd-topbar-title {
      font-size: 13px; font-weight: 600; color: #222;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hd-topbar-artist {
      font-size: 11px; color: #888;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Right side of top bar */
    .hd-topbar-right {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .hd-topbar-right button {
      width: 32px; height: 32px;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 18px;
      transition: color .15s;
    }
    .hd-topbar-right button:hover { color: #111; }
    .hd-volume-slider {
      width: 80px; accent-color: #222;
    }

    /* Left sidebar — narrow, fixed, white */
    body[data-page="post"] #sidebar {
      width: 200px;
      background: #ffffff;
      border-right: 1px solid #ddd;
      padding-top: 20px;
    }
    body[data-page="post"] #sidebar .sidebar-brand {
      padding: 0 20px; margin-bottom: 20px;
    }
    body[data-page="post"] #sidebar .sidebar-brand .brand-name {
      font-size: 14px;
    }
    body[data-page="post"] #sidebar nav a {
      padding: 10px 20px;
      font-size: 13px;
    }
    body[data-page="post"] #sidebar-login-block {
      padding: 12px 20px;
    }

    /* Main area: offset for 200px left sidebar */
    body[data-page="post"] #main {
      margin-left: 200px;
      margin-top: var(--player-h);
      padding: 0;
      background: #f0f0f0;
      min-height: calc(100vh - var(--player-h));
    }

    /* Post content wrapper — centers content with right share strip */
    #post-page-wrap {
      display: flex;
      align-items: flex-start;
      min-height: calc(100vh - var(--player-h));
    }

    /* Center column — holds hero card + article */
    #post-center {
      flex: 1; min-width: 0;
      padding: 24px 24px 60px;
    }

    /* ── HERO CARD — two-column: artwork left, metadata right ── */
    #post-hero.hd-hero {
      display: flex;
      background: #f5f5f5;
      border: 1px solid #ddd;
      overflow: hidden;
      min-height: 280px;
      margin-bottom: 0;
    }
    .hd-hero-art {
      width: 280px; flex-shrink: 0;
      position: relative; overflow: hidden;
      background: #222;
    }
    .hd-hero-art img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .hd-hero-art .hd-art-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.2);
      opacity: 0; transition: opacity .2s;
    }
    .hd-hero-art:hover .hd-art-overlay { opacity: 1; }
    .hd-art-play-circle {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #111;
      padding-left: 3px;
    }

    .hd-hero-meta {
      flex: 1; min-width: 0;
      background: #ffffff;
      padding: 28px 28px 24px;
      display: flex; flex-direction: column;
      gap: 0;
      border-left: 1px solid #eee;
    }
    .hd-hero-meta .hd-post-title {
      font-size: 24px; font-weight: 700;
      color: #1a1a1a; line-height: 1.2;
      margin-bottom: 6px;
    }
    .hd-hero-meta .hd-post-artist {
      font-size: 16px; color: #555; font-weight: 400;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .hd-hero-meta .hd-post-artist:hover { color: #111; }
    .hd-post-date-line {
      font-size: 13px; color: #555; margin-bottom: 16px;
    }
    .hd-post-date-line .hd-date-val {
      color: #c0392b; font-weight: 500;
    }
    .hd-post-play-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #222; color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 8px 18px; border-radius: 3px;
      border: none; cursor: pointer;
      margin-bottom: 16px;
      transition: background .15s;
      width: fit-content;
    }
    .hd-post-play-btn:hover { background: #000; }
    .hd-tagged-as {
      font-size: 12px; color: #888; margin-bottom: 8px;
    }
    .hd-genre-pills {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .hd-genre-pill {
      font-size: 12px; color: #444;
      border: 1px solid #ccc; background: #fff;
      padding: 3px 10px; border-radius: 3px;
      cursor: pointer; text-decoration: none;
      transition: border-color .15s;
    }
    .hd-genre-pill:hover { border-color: #888; color: #111; }
    .hd-country-flag {
      font-size: 20px; margin-bottom: 10px; display: inline-block;
    }
    .hd-stream-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;
    }
    .hd-stream-link {
      font-size: 11px; font-weight: 600; padding: 5px 12px;
      border-radius: 3px; text-decoration: none;
      border: 1px solid #ddd; color: #444;
      transition: border-color .15s;
    }
    .hd-stream-link:hover { border-color: #888; color: #111; }
    .hd-stream-link.spotify { border-color: #1db954; color: #1db954; }
    .hd-stream-link.spotify:hover { background: #1db954; color: #fff; }

    /* ── ARTICLE BODY — white card below hero ── */
    #post-article {
      background: #ffffff;
      border: 1px solid #ddd;
      border-top: none;
      display: flex;
      gap: 0;
    }
    #post-body {
      flex: 1; min-width: 0;
      padding: 32px 36px 36px;
      font-size: 15px; line-height: 1.75;
      color: #333;
    }
    #post-body p { margin-bottom: 20px; }
    #post-body p:last-child { margin-bottom: 0; }
    .post-spotify-embed, .post-youtube-embed {
      margin-top: 24px;
    }

    /* Right sidebar inside article card */
    #post-sidebar {
      width: 220px; flex-shrink: 0;
      padding: 28px 20px;
      border-left: 1px solid #eee;
      background: #fff;
    }
    #post-sidebar section {
      margin-bottom: 24px;
    }
    #post-sidebar h4 {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: #999; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid #eee;
    }

    /* Tracklist below */
    #post-tracklist {
      background: #fff; border: 1px solid #ddd; border-top: none;
      padding: 0 36px 28px;
    }

    /* ── SHARE STRIP — far right ── */
    #hd-share-strip {
      width: 72px; flex-shrink: 0;
      background: #e8e8e8;
      border-left: 1px solid #d5d5d5;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 28px 0 20px;
      min-height: 280px;
      position: sticky; top: var(--player-h);
      max-height: calc(100vh - var(--player-h));
    }
    .hd-share-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 20px;
    }
    .hd-share-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; margin-bottom: 14px;
      text-decoration: none;
      font-size: 18px;
      transition: opacity .15s;
    }
    .hd-share-icon:hover { opacity: .75; }
    .hd-share-icon.fb { background: #3b5998; color: #fff; }
    .hd-share-icon.tw { background: #000; color: #fff; font-size: 15px; }
    .hd-share-icon.ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); color: #fff; }
    .hd-share-count {
      margin-top: auto;
      font-size: 10px; color: #aaa;
      text-align: center; line-height: 1.4;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      body[data-page="post"] #sidebar { display: none; }
      body[data-page="post"] #main { margin-left: 0; }
      #hd-share-strip { display: none; }
      .hd-hero-art { width: 160px; }
      #post-sidebar { display: none; }
    }
    @media (max-width: 600px) {
      #post-hero.hd-hero { flex-direction: column; }
      .hd-hero-art { width: 100%; height: 220px; }
      #post-center { padding: 12px 12px 60px; }
      #post-body { padding: 20px 16px; font-size: 14px; }
      .hd-hero-meta { padding: 18px 16px; }
      .hd-hero-meta .hd-post-title { font-size: 20px; }
    }

    /* Hide original player-bar children that we're replacing on post page */
    body[data-page="post"] #player-bar > .player-art,
    body[data-page="post"] #player-bar > .player-controls,
    body[data-page="post"] #player-bar > .player-info,
    body[data-page="post"] #player-bar > .player-right,
    body[data-page="post"] #player-bar > .player-progress {
      display: none !important;
    }
  </style>

  <script>
    // Sync top bar track info from the hidden player bar
    (function() {
      const hdTitle = document.getElementById('hd-topbar-title');
      const hdArtist = document.getElementById('hd-topbar-artist');
      const hdArt = document.getElementById('hd-topbar-art');

      function syncTopBar() {
        const title = document.querySelector('.player-title');
        const art = document.querySelector('.player-art');
        if (title && hdTitle && title.textContent !== 'Select a track to play') {
          const parts = title.textContent.split(' - ');
          hdTitle.textContent = parts.length > 1 ? parts.slice(1).join(' - ') : title.textContent;
          if (hdArtist) hdArtist.textContent = parts[0] || '';
        }
        if (art && hdArt && art.src && !art.src.includes('logo-black')) {
          hdArt.src = art.src;
        }
        // Sync play/pause state on top bar button
        const hdPlayBtn = document.querySelector('.hd-play-btn');
        const origPlayBtn = document.querySelector('.play-btn');
        if (hdPlayBtn && origPlayBtn) {
          hdPlayBtn.innerHTML = origPlayBtn.classList.contains('is-paused') ? '&#9646;&#9646;' : '&#9654;';
        }
      }

      // Poll every 500ms for player state changes
      setInterval(syncTopBar, 500);

      // Share links — set dynamically once page loads
      setTimeout(() => {
        const url = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.title);
        const fbBtn = document.getElementById('hd-share-fb');
        const twBtn = document.getElementById('hd-share-tw');
        if (fbBtn) fbBtn.href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
        if (twBtn) twBtn.href = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
      }, 1000);
    })();
  </script>
